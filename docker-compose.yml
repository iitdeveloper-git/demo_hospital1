version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: AarogyaCare-app:latest
    restart: unless-stopped
    ports:
      - "8000:80"
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
    volumes:
      - .env:/var/www/html/.env
      - storage-data:/var/www/html/storage
    depends_on:
      - db
      - redis

  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: AarogyaCare
      MYSQL_ROOT_PASSWORD: secret_root_password
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  redis:
    image: redis:alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  mysql-data:
  redis-data:
  storage-data:
