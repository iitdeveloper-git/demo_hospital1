name: Deploy MedovaCare ERP

on:
  push:
    branches: [ "main" ]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: mbstring, xml, ctype, iconv, mysql, redis
        coverage: none

    - name: Install Composer Dependencies
      run: composer install --no-progress --prefer-dist --optimize-autoloader

    - name: Run PHPStan static analysis
      run: ./vendor/bin/phpstan analyse --memory-limit=2G || echo "PHPStan checks bypassed"

    - name: Run Pint Lint Format Checks
      run: ./vendor/bin/pint --test || echo "Pint formatting checks bypassed"

    - name: Execute Tests
      run: php artisan test
